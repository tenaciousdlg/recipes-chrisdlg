# Phase 2 ingredient database: normalized item -> per-100g macros + a gram
# equivalent for each unit that item is actually used with across our recipes.
# Recipe quantities are raw/as-purchased amounts (e.g. "2 lb ground turkey"
# means 2 lb raw, before cooking), so macros here are on the same raw basis --
# this matches how a recipe nutrition calculator (and our own hand-entered
# macros) works: qty x per-unit macro, summed across ingredients.
#
# `source` on each entry:
#   usda        - a standard commodity value that doesn't vary meaningfully by
#                 brand or recipe context (USDA FoodData Central ballpark)
#   brand:NAME  - a specific named product used in our recipes, sourced from
#                 the manufacturer's published label (via nutritionvalue.org /
#                 fatsecret / eatthismuch / mynetdiary aggregation)
#   estimate    - no single authoritative source; a reasonable typical value
#
# DRAFT -- not yet wired into any macro computation. Meant for review first.
#
# Open questions flagged inline with a comment where a real judgment call was
# made (canned-good "oz" = can size vs. drained weight, lemon/lime = juice
# yield not whole-fruit weight since that's how our recipes use them, etc).

